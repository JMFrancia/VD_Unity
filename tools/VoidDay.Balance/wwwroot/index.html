<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VoidDay Balance Workbench</title>
  <style>
    :root {
      --bg: #14171c; --panel: #1c2027; --panel2: #232833; --line: #333a46;
      --fg: #e6e9ef; --muted: #8b93a3; --accent: #5aa6ff; --accent2: #3b7fd4;
      --ok: #4caf7d; --warn: #e0a83b; --err: #e46060; --add: #6bbf8a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg);
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    a { color: var(--accent); }
    header { position: sticky; top: 0; z-index: 10; background: var(--panel);
      border-bottom: 1px solid var(--line); padding: 8px 14px; display: flex;
      align-items: center; gap: 10px; flex-wrap: wrap; }
    header h1 { font-size: 14px; margin: 0 12px 0 0; font-weight: 600; letter-spacing: .3px; }
    header .grow { flex: 1; }
    .toolbar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    select, input, button, textarea {
      font: inherit; color: var(--fg); background: var(--panel2);
      border: 1px solid var(--line); border-radius: 5px; padding: 4px 7px; }
    input[type=number] { width: 82px; text-align: right; }
    input[type=text] { min-width: 90px; }
    button { cursor: pointer; background: var(--panel2); }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
    button.primary:hover { background: var(--accent); }
    button.danger:hover { border-color: var(--err); color: var(--err); }
    button.add { color: var(--add); border-color: #2f4a3c; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .dirty { color: var(--warn); font-size: 12px; }
    nav { display: flex; gap: 2px; padding: 0 10px; background: var(--panel);
      border-bottom: 1px solid var(--line); overflow-x: auto; }
    nav button { border: none; border-bottom: 2px solid transparent; border-radius: 0;
      background: none; padding: 9px 14px; color: var(--muted); }
    nav button.active { color: var(--fg); border-bottom-color: var(--accent); }
    main { padding: 16px; max-width: 1180px; }
    main.reports { max-width: 1560px; }
    h2 { font-size: 15px; margin: 0 0 12px; font-weight: 600; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
      padding: 14px 16px; margin-bottom: 16px; }
    .card > h3 { margin: 0 0 10px; font-size: 13px; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px 18px; }
    .fld { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .fld label { color: var(--muted); }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; }
    td.ro { color: var(--muted); }
    .tblwrap { overflow-x: auto; }
    .chip { display: inline-block; background: var(--panel2); border: 1px solid var(--line);
      border-radius: 4px; padding: 1px 6px; margin: 1px 2px; font-size: 11px; color: var(--muted); }
    .sub { border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; margin: 6px 0; background: var(--panel2); }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 3px 0; }
    .val { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
    .errs { border: 1px solid var(--err); background: #2a1c1c; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 16px; }
    .errs b { color: var(--err); }
    .errs ul { margin: 6px 0 0; padding-left: 18px; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex;
      align-items: center; justify-content: center; z-index: 50; }
    .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
      padding: 18px 20px; max-width: 640px; width: 92%; max-height: 82vh; overflow: auto; }
    .modal h3 { margin: 0 0 12px; }
    .modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    pre { background: #0e1116; border: 1px solid var(--line); border-radius: 6px;
      padding: 10px; overflow: auto; font: 12px/1.4 ui-monospace, Menlo, monospace; }
    .change { font: 12px ui-monospace, Menlo, monospace; }
    .change .old { color: var(--err); } .change .new { color: var(--ok); }
    .muted { color: var(--muted); } .small { font-size: 12px; }
    .hint { color: var(--muted); font-size: 12px; margin: -4px 0 10px; }

    /* ---- M06 reports ---- */
    .rep-controls { display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
    .rep-controls .fld { flex-direction: column; align-items: flex-start; gap: 3px; }
    .rep-controls label { color: var(--muted); font-size: 12px; }
    .chartwrap { position: relative; width: 100%; }
    .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 16px; }
    .chart-grid .card { margin-bottom: 0; }
    .span2 { grid-column: 1 / -1; }
    /* heatmap */
    .heat { border-collapse: collapse; }
    .heat th, .heat td { border: 1px solid var(--line); padding: 4px 8px; text-align: center; font-size: 12px; }
    .heat th { color: var(--muted); background: var(--panel2); }
    .heat td.lvl { color: var(--muted); background: var(--panel2); font-weight: 600; }
    .heat td.cell { color: #fff; font-variant-numeric: tabular-nums; cursor: default; }
    /* seed strip */
    .seedstrip { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .seedstrip button { padding: 3px 8px; font-size: 11px; font-variant-numeric: tabular-nums; }
    .seedstrip button:hover { border-color: var(--accent); color: var(--accent); }
    /* delta table */
    .delta td.up { color: var(--err); } .delta td.down { color: var(--ok); } .delta td.zero { color: var(--muted); }
    .delta td { font-variant-numeric: tabular-nums; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .swatch { display: inline-block; width: 11px; height: 11px; border-radius: 2px; vertical-align: -1px; margin-right: 4px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/vendor/chart.umd.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
